<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberShield AI — Enterprise Cyber Defense & Threat Hunting Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{ color-scheme: light; }
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17; --bg2:#111726; --bg3:#161d2e; --panel:#131a29; --panel2:#1a2336;
  --line:#243049; --line2:#2e3c5a; --txt:#e6ecf7; --txt2:#9fb0cc; --txt3:#6b7c9e;
  --accent:#3b82f6; --accent2:#22d3ee; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
  --crit:#dc2626; --high:#f97316; --med:#eab308; --low:#3b82f6;
  --purple:#a855f7; --shadow:0 8px 30px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#eef2f8; --bg2:#ffffff; --bg3:#f4f7fc; --panel:#ffffff; --panel2:#f7fafd;
  --line:#dce4f0; --line2:#cdd8ea; --txt:#142036; --txt2:#46566f; --txt3:#7888a3;
  --shadow:0 8px 24px rgba(20,40,80,.10);
}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
.app{display:grid;grid-template-columns:248px 1fr;grid-template-rows:58px 1fr;height:100vh}
header{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:0 18px;
  background:linear-gradient(90deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--line);z-index:30}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:.3px;white-space:nowrap}
.logo .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;box-shadow:0 0 14px rgba(59,130,246,.5)}
.logo b{background:linear-gradient(90deg,#60a5fa,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{color:var(--txt3);font-weight:500;font-size:10.5px;display:block;letter-spacing:.2px}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);
  border-radius:9px;padding:7px 12px;color:var(--txt3)}
.search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:13px}
.hdr-spacer{flex:1}
.riskpill{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);
  padding:5px 12px;border-radius:9px;cursor:default}
.riskpill .v{font-size:18px;font-weight:800}
.riskpill .lab{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;line-height:1.1}
.hdr-btn{background:var(--bg);border:1px solid var(--line);color:var(--txt2);border-radius:9px;
  padding:7px 11px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s}
.hdr-btn:hover{border-color:var(--accent);color:var(--txt)}
.hdr-btn.cta{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none}
.role-select{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:9px;
  padding:7px 10px;font-size:13px;cursor:pointer;outline:none}
.bell{position:relative}
.bell .dot{position:absolute;top:3px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--bad);box-shadow:0 0 0 2px var(--bg2)}
nav{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;padding:10px 0}
nav::-webkit-scrollbar{width:8px} nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
.nav-grp{padding:11px 18px 5px;font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--txt3);font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;color:var(--txt2);
  font-size:13.5px;border-left:3px solid transparent;transition:.12s}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:var(--panel2);color:var(--txt);border-left-color:var(--accent);font-weight:600}
.nav-item .ico{width:18px;text-align:center;font-size:15px;opacity:.92}
.nav-item .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:10px;font-weight:700;
  border-radius:10px;padding:1px 7px;min-width:18px;text-align:center}
.nav-item .badge.amber{background:var(--warn)} .nav-item .badge.blue{background:var(--accent)}
main{overflow-y:auto;padding:22px 26px 60px}
main::-webkit-scrollbar{width:10px} main::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap}
.page-head h1{font-size:22px;font-weight:700;letter-spacing:.2px}
.page-head .sub{color:var(--txt2);font-size:13px;margin-top:3px}
.page-head .role-tag{font-size:11px;color:var(--accent2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
  padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#fff}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ghost{background:none}
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)} .g6{grid-template-columns:repeat(6,1fr)}
.col-2{grid-column:span 2}
@media(max-width:1180px){.g4,.g6{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 17px;box-shadow:var(--shadow)}
.card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card h3 .more{font-size:11px;color:var(--txt3);font-weight:500;cursor:pointer}
.kpi{position:relative;overflow:hidden}
.kpi .lab{font-size:11.5px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .val{font-size:30px;font-weight:800;margin:7px 0 2px;line-height:1}
.kpi .delta{font-size:12px;font-weight:600}
.kpi .spark{position:absolute;right:12px;top:14px;font-size:22px;opacity:.18}
.up{color:var(--bad)} .down{color:var(--good)} .flat{color:var(--txt3)}
.ring{width:108px;height:108px;position:relative;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .lbl b{font-size:26px;font-weight:800;display:block;line-height:1}
.ring .lbl span{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.t-crit{background:rgba(220,38,38,.16);color:#f87171;border:1px solid rgba(220,38,38,.4)}
.t-high{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.4)}
.t-med{background:rgba(234,179,8,.15);color:#fbbf24;border:1px solid rgba(234,179,8,.38)}
.t-low{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.38)}
.t-good{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.38)}
.t-info{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.34)}
.t-purple{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.4)}
.dot-s{width:8px;height:8px;border-radius:50%;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--txt3);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;
  font-weight:700;padding:9px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:10px;border-bottom:1px solid var(--line)}
tr.row{cursor:pointer;transition:.1s} tr.row:hover td{background:var(--bg3)}
.mono{font-family:'Cascadia Code',Consolas,monospace;font-size:12px}
.bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;border-radius:4px}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-grid;place-items:center;font-size:11px;font-weight:700;
  background:var(--panel2);border:1px solid var(--line2);color:var(--accent2)}
.muted{color:var(--txt2)} .tiny{font-size:11.5px}
.linkish{color:var(--accent2);cursor:pointer} .linkish:hover{text-decoration:underline}
.scoreboard{display:flex;gap:5px;align-items:center}
.chart-wrap{position:relative;height:200px} .chart-wrap.sm{height:150px} .chart-wrap.lg{height:260px}
.plist{display:flex;flex-direction:column;gap:11px}
.prow{display:flex;align-items:center;gap:11px;font-size:13px}
.prow .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .pc{width:42px;text-align:right;font-weight:700;font-size:12px}
.mitre{display:grid;grid-template-columns:repeat(13,1fr);gap:5px;overflow-x:auto}
.mitre .col{min-width:88px}
.mitre .ch{font-size:9.5px;font-weight:700;color:var(--txt2);text-align:center;padding:6px 2px;
  border-bottom:1px solid var(--line);margin-bottom:5px;height:46px;display:flex;align-items:center;justify-content:center;text-transform:uppercase}
.tech{font-size:9.5px;padding:5px 4px;border-radius:5px;margin-bottom:4px;text-align:center;cursor:pointer;
  border:1px solid var(--line);background:var(--bg3);color:var(--txt2);line-height:1.2;transition:.12s}
.tech:hover{transform:translateY(-1px);border-color:var(--accent2)}
.tech.l1{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:#93c5fd}
.tech.l2{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.4);color:#fcd34d}
.tech.l3{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.5);color:#fca5a5;font-weight:700}
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--line2)}
.tl-item{position:relative;padding:0 0 16px 0}
.tl-item::before{content:'';position:absolute;left:-22px;top:4px;width:11px;height:11px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 3px var(--bg)}
.tl-item.crit::before{background:var(--bad)} .tl-item.good::before{background:var(--good)}
.tl-item .tm{font-size:11px;color:var(--txt3);font-family:monospace}
.tl-item .ev{font-size:13px;margin-top:2px}
.copilot{position:fixed;top:0;right:-440px;width:430px;height:100vh;background:var(--bg2);
  border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(0,0,0,.4);z-index:60;transition:right .28s ease;
  display:flex;flex-direction:column}
.copilot.open{right:0}
.cop-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
.cop-head .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--accent2));
  display:grid;place-items:center;color:#fff;font-weight:800}
.cop-head h4{font-size:14px} .cop-head small{color:var(--txt3);font-size:11px}
.cop-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.cop-msg{display:flex;gap:10px;max-width:100%}
.cop-msg .b{padding:11px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.cop-msg.ai .b{background:var(--panel2);border:1px solid var(--line)}
.cop-msg.me{flex-direction:row-reverse}
.cop-msg.me .b{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff}
.cop-av{width:28px;height:28px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:13px;
  background:var(--panel2);border:1px solid var(--line)}
.cop-foot{padding:13px;border-top:1px solid var(--line)}
.cop-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:16px;background:var(--bg3);border:1px solid var(--line);
  cursor:pointer;color:var(--txt2);transition:.12s}
.chip:hover{border-color:var(--accent2);color:var(--txt)}
.cop-input{display:flex;gap:8px}
.cop-input input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 12px;
  color:var(--txt);outline:none;font-size:13px}
.cop-input button{background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#fff;
  border-radius:9px;padding:0 14px;cursor:pointer;font-weight:700}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;display:none}
.backdrop.show{display:block}
.drawer{position:fixed;top:0;right:-720px;width:700px;max-width:92vw;height:100vh;background:var(--bg2);
  border-left:1px solid var(--line);z-index:65;transition:right .28s ease;overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,.45)}
.drawer.open{right:0}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:2}
.drawer-body{padding:20px 22px 50px}
.x{cursor:pointer;color:var(--txt3);font-size:20px;line-height:1;background:none;border:none}
.x:hover{color:var(--txt)}
.flex{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);font-weight:700;margin:6px 0 10px}
.divider{height:1px;background:var(--line);margin:16px 0}
.pill-row{display:flex;flex-wrap:wrap;gap:8px}
.note{background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--txt2)}
.kv{display:grid;grid-template-columns:140px 1fr;gap:7px 14px;font-size:13px}
.kv .k{color:var(--txt3)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--txt2);border-bottom:2px solid transparent;font-weight:600}
.tab.active{color:var(--txt);border-bottom-color:var(--accent)}
.codeblk{background:#0b1020;border:1px solid var(--line);border-radius:9px;padding:13px;font-family:monospace;
  font-size:12px;color:#9fe0ff;white-space:pre-wrap;line-height:1.6;overflow-x:auto}
.hl-k{color:#c084fc} .hl-s{color:#86efac} .hl-f{color:#fbbf24}
.empty{text-align:center;color:var(--txt3);padding:40px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--txt2);margin-top:8px}
.legend span{display:flex;align-items:center;gap:5px}
.fade-in{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.flow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.flow .node{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 13px;font-size:12px;text-align:center}
.flow .arr{color:var(--txt3);font-size:18px}
.stepper{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:13px;padding:11px 0;border-bottom:1px dashed var(--line)}
.step .n{width:26px;height:26px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);
  flex:none;display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--accent2)}
.step .ct b{font-size:13px} .step .ct p{font-size:12px;color:var(--txt2);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="mark">CS</div>
      <div>CyberShield <b>AI</b><small>Enterprise Cyber Defense &amp; Threat Hunting</small></div>
    </div>
    <div class="search">
      &#128269; <input id="globalSearch" placeholder="Search assets, users, IOCs, alerts, incidents…  (try: 'DNS tunneling')" />
    </div>
    <div class="hdr-spacer"></div>
    <div class="riskpill" title="Enterprise Cyber Risk Score">
      <span id="hdrRiskDot" class="dot-s" style="background:var(--high)"></span>
      <div><div class="lab">Cyber Risk</div></div>
      <span class="v" id="hdrRisk" style="color:var(--high)">78</span>
    </div>
    <select class="role-select" id="roleSelect" title="Active role"></select>
    <button class="hdr-btn bell" title="Notifications" onclick="go('incidents')">&#128276;<span class="dot"></span></button>
    <button class="hdr-btn" id="themeBtn" title="Toggle theme" onclick="toggleTheme()">&#9728;&#65039;</button>
    <button class="hdr-btn cta" onclick="openCopilot()">&#10024; Ask Claude</button>
  </header>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div class="copilot" id="copilot">
  <div class="cop-head">
    <div class="mark">&#10024;</div>
    <div style="flex:1"><h4>Claude &middot; Cyber Defense Copilot</h4><small id="copCtx">Powered by Claude &middot; context: Dashboard</small></div>
    <button class="x" onclick="closeCopilot()">&times;</button>
  </div>
  <div class="cop-body" id="copBody"></div>
  <div class="cop-foot">
    <div class="cop-chips" id="copChips"></div>
    <div class="cop-input">
      <input id="copInput" placeholder="Ask anything — investigate, summarize, hunt…" onkeydown="if(event.key==='Enter')sendCop()" />
      <button onclick="sendCop()">&#10148;</button>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeAll()"></div>
<div class="drawer" id="drawer"><div id="drawerContent"></div></div>

<script>
const ROLES = {
  exec:    {name:'CISO / Executive', home:'dashboard', view:'exec'},
  socmgr:  {name:'SOC Manager', home:'dashboard', view:'socmgr'},

  grc:     {name:'Compliance / GRC', home:'compliance', view:'grc'},
};
let state = { role:'exec', module:'dashboard', theme:'dark' };

const NAV = [
  ['Command', [
    ['dashboard','&#9672;','Cyber Defense Dashboard'],
    ['soc','&#9636;','SOC Operations', 142,'amber'],
    ['incidents','&#9670;','Incidents &amp; Cases', 7,''],
    ['hunt','&#9673;','Threat Hunting'],
  ]],
  ['Defense Layers', [
    ['network','&#8644;','Network Defense', 23,'amber'],
    ['iam','&#9680;','Identity &amp; Access', 11,'amber'],
    ['appsec','&#10094;&#10095;','Application Security'],
    ['endpoint','&#9635;','Endpoint &amp; Server', 4,''],
    ['cloud','&#9729;','Cloud Security', 9,'amber'],
  ]],
  ['Intelligence &amp; Risk', [
    ['ti','&#9678;','Threat Intelligence'],
    ['vuln','&#9888;','Vulnerability Mgmt', 318,'blue'],
    ['detect','&#8862;','Detection Engineering'],
    ['soar','&#9881;','SOAR &amp; Automation'],
  ]],
  ['Governance', [
    ['compliance','&#9638;','Compliance &amp; GRC'],
    ['reports','&#9637;','Reports'],
    ['architecture','&#9671;','Architecture &amp; Data Model'],
    ['admin','&#9919;','Roles &amp; Access (RBAC)'],
  ]],
];

const ALERTS = [
  {id:'AL-4821',sev:'crit',t:'12:41',name:'Encoded PowerShell + LSASS access on FIN-WS-204',src:'CrowdStrike',entity:'j.okoro',asset:'FIN-WS-204',mitre:['T1059.001','T1003.001'],score:96,status:'Open'},
  {id:'AL-4818',sev:'crit',t:'12:38',name:'Impossible travel — admin login Riyadh to Kyiv in 22m',src:'Entra ID',entity:'svc-backup',asset:'AzureAD',mitre:['T1078','T1133'],score:94,status:'Triage'},
  {id:'AL-4810',sev:'high',t:'12:19',name:'DNS tunneling pattern to news-cdn[.]live',src:'Sentinel',entity:'MKT-WS-77',asset:'MKT-WS-77',mitre:['T1071.004','T1048'],score:88,status:'Open'},

function buildNav(){
  let h='';
  NAV.forEach(([grp,items])=>{
    h+='<div class="nav-grp">'+grp+'</div>';
    items.forEach(([id,ico,label,badge,cls])=>{
      h+='<div class="nav-item '+(state.module===id?'active':'')+'" onclick="go(\''+id+'\')">'
        +'<span class="ico">'+ico+'</span><span>'+label+'</span>'
        +(badge?'<span class="badge '+(cls||'')+'">'+badge+'</span>':'')+'</div>';
    });
  });
  $('#nav').innerHTML=h;
}
function go(mod){ state.module=mod; buildNav(); render(); $('#main').scrollTop=0; }
function setRole(r){ state.role=r; state.module=ROLES[r].home; buildNav(); render(); }
function toggleTheme(){
  state.theme = state.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', state.theme==='light'?'light':'');
  $('#themeBtn').innerHTML = state.theme==='dark'?'&#9728;&#65039;':'&#127769;';
  render();
}

function render(){
  destroyCharts();
  const r = ROLES[state.role];
  const fn = RENDER[state.module] || (()=>'<div class="empty">Module coming soon.</div>');
  $('#main').innerHTML = '<div class="fade-in">'+fn(r)+'</div>';
  if(window._afterRender){const cbs=window._afterRender;window._afterRender=null;cbs.forEach(f=>f())}
  if(typeof refreshCopChips==='function') refreshCopChips();
}
function after(fn){ (window._afterRender=window._afterRender||[]).push(fn) }
function head(title,sub,actions){
  return '<div class="page-head"><div>'
    +'<div class="role-tag">'+ROLES[state.role].name+' view</div>'

    +'<div class="flex wrap">'+(actions||'')+'</div></div>';
}
function ring(val){
  const c=2*Math.PI*46, off=c*(1-val/100), col=barColor(val);
  return '<div class="ring"><svg width="108" height="108">'
    +'<circle cx="54" cy="54" r="46" stroke="var(--line)" stroke-width="10" fill="none"/>'
    +'<circle cx="54" cy="54" r="46" stroke="'+col+'" stroke-width="10" fill="none"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/></svg>'
    +'<div class="lbl"><div><b style="color:'+col+'">'+val+'</b><span>/ 100</span></div></div></div>';
}

    +'<div class="search" style="max-width:none;margin-bottom:14px">&#9998; <input value="Adversary may be using cloud IAM role chaining for privilege escalation" /></div>'
    +'<div class="sec-title">2 · Hunt type</div>'
    +'<div class="pill-row" style="margin-bottom:14px">'+['Hypothesis','IOC','Behavior','Intel-led','Anomaly','Campaign'].map((t,i)=>'<span class="tag '+(i===0?'t-purple':'t-info')+'">'+t+'</span>').join(' ')+'</div>'
    +'<div class="sec-title">3 · MITRE techniques</div>'
    +'<div style="margin-bottom:14px">'+mitrePills(['T1098','T1548','T1078.004'])+'</div>'
    +'<div class="sec-title">4 · AI-generated query</div>'
    +'<div class="codeblk">CloudTrail\n| where eventName in ("AssumeRole","CreateAccessKey","AttachRolePolicy")\n| summarize chain=make_list(eventName) by userIdentity.arn, bin(eventTime,10m)\n| where array_length(chain) >= 3</div>'
    +'<div class="flex wrap" style="margin-top:16px;gap:8px"><button class="btn primary sm" onclick="alert(\'Hunt launched (demo)\')">Launch hunt</button><button class="btn sm" onclick="openCopilot(\'Suggest a better query and additional data sources for cloud IAM privilege escalation hunting.\')">&#10024; Refine with AI</button></div>'
  +'</div>');
}

/* ---- Claude integration: context-aware across every module ---- */
const MODULE_CTX = {
  dashboard:{label:'Enterprise Dashboard', chips:['Summarize our current cyber risk posture','What are today\'s top 3 risks?','Brief the board in 3 bullets']},
  soc:{label:'SOC Operations', chips:['Which 5 alerts should I triage first?','Why is AL-4821 critical?','Draft a shift handover summary','Recommend response for the SMB lateral movement alert']},
  incidents:{label:'Incidents', chips:['Summarize INC-2026-0412','Map INC-2026-0412 to MITRE ATT&CK','Recommend containment actions','Generate an executive closure report']},
  hunt:{label:'Threat Hunting', chips:['Suggest 3 hunt hypotheses from current telemetry','Write a KQL query for DNS tunneling','Which MITRE techniques are uncovered?','Turn the latest intel into a hunt']},
  vuln:{label:'Vulnerability Management', chips:['Which 5 vulns should we patch first?','Explain CVE-2024-3400 business impact','Suggest compensating controls for VPN-GW-02','Predict breach likelihood for our top vulns']},
  iam:{label:'Identity & Access', chips:['Why is svc-backup high risk?','Detect account-takeover patterns','Recommend access reviews','Find toxic permission combinations']},
  network:{label:'Network Defense', chips:['Investigate the news-cdn[.]live beacon','Recommend firewall rule changes','Detect lateral movement paths','Explain the DNS tunneling signal']},
  appsec:{label:'Application Security', chips:['Prioritize exploitable app vulns','Explain the SQLi burst on /api/orders','Map attacks to OWASP Top 10','Draft a developer fix for the IDOR']},
  endpoint:{label:'Endpoint Defense', chips:['Summarize the FIN-WS-204 timeline','Recommend containment for FIN-WS-204','Is this ransomware behavior?','Map endpoint activity to MITRE']},
  cloud:{label:'Cloud Security', chips:['Cloud attack path for the public S3 exposure','Fix the over-permissive ci-deployer role','Prioritize our cloud misconfigs','Least-privilege policy recommendation']},
  ti:{label:'Threat Intelligence', chips:['Map APT-Sandworm TTPs to our coverage','Convert this week\'s intel into hunts','Recommend new detection rules','Which threats target our sector?']},
  detect:{label:'Detection Engineering', chips:['Create a Sigma rule for LSASS dumping','Close our top 5 MITRE gaps','Explain this detection\'s logic','Suggest tuning to cut false positives']},
  soar:{label:'SOAR & Automation', chips:['Which responses can we safely automate?','Build a phishing response playbook','Recommend approval gates','Draft an isolation workflow']},
  compliance:{label:'Compliance & GRC', chips:['Identify our top compliance gaps','Map INC-2026-0409 to failed controls','Draft an ISO 27001 audit response','Build a remediation plan with owners']},
  reports:{label:'Reports', chips:['Generate the Executive Cyber Posture Report','Draft the Daily SOC Operations Report','Write the Board Cybersecurity Report','Summarize this week\'s hunts']},
  architecture:{label:'Architecture & Data Model', chips:['Explain the data flow end to end','How is the risk score calculated?','Describe the core data entities']},
  admin:{label:'Roles & Access', chips:['Explain least-privilege for SOC L1','Which roles can approve automation?','Recommend RBAC for a new hunter']},
};
const DEFAULT_CHIPS=['Summarize this view','What needs my attention?','Recommend next actions'];
let copStarted=false;
let copFocus=null;
function setCopFocus(o){ copFocus=o; }
function moduleLabel(){ return (MODULE_CTX[state.module]||{}).label || 'CyberShield'; }

function claudeStrip(){
  const m=MODULE_CTX[state.module]||{}; const chips=(m.chips||DEFAULT_CHIPS).slice(0,3);
  return '<div class="card" style="margin-bottom:16px;border:1px solid var(--line2);background:linear-gradient(90deg,rgba(168,85,247,.12),rgba(34,211,238,.06))">'
    +'<div class="flex between wrap" style="gap:10px"><div class="flex" style="gap:11px">'
    +'<div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--accent2));display:grid;place-items:center;color:#fff;font-weight:800;flex:none">&#10024;</div>'
    +'<div><b>Claude AI is monitoring this module</b><div class="tiny muted">Ask anything about '+moduleLabel()+' — answers are grounded in the live data on screen.</div></div></div>'
    +'<button class="btn primary sm" onclick="openCopilot()">&#10024; Ask Claude</button></div>'
    +'<div class="pill-row" style="margin-top:12px">'+chips.map(c=>'<span class="chip" onclick="openCopilot(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</span>').join('')+'</div></div>';
}
function refreshCopChips(){
  const ctx=document.getElementById('copCtx');
  if(ctx) ctx.textContent='Powered by Claude · '+moduleLabel()+' · '+ROLES[state.role].name;
  const el=document.getElementById('copChips'); if(!el) return;
  const chips=((MODULE_CTX[state.module]||{}).chips)||DEFAULT_CHIPS;
  el.innerHTML=chips.map(c=>'<span class="chip" onclick="askCop(this.textContent)">'+c.replace(/'/g,'&#39;')+'</span>').join('');
}
function dataForModule(){
  const base={module:moduleLabel(), role:ROLES[state.role].name, enterpriseRiskScore:78};
  switch(state.module){
    case 'soc': base.alerts=ALERTS; break;
    case 'incidents': base.incidents=INCIDENTS; break;
    case 'hunt': base.hunts=HUNTS; base.activeTechniques=TECH_ACTIVE; break;
    case 'vuln': base.vulnerabilities=VULNS; base.riskyAssets=RISKY_ASSETS; break;
    case 'iam': base.riskyUsers=RISKY_USERS; break;
    case 'compliance': base.frameworks=COMPLIANCE; break;
    case 'ti': base.activeTechniques=TECH_ACTIVE; base.alerts=ALERTS.slice(0,4); break;
    case 'detect': base.detections=DETECTIONS; break;
    case 'dashboard': base.alerts=ALERTS.slice(0,5); base.incidents=INCIDENTS.slice(0,4); base.riskyAssets=RISKY_ASSETS.slice(0,5); base.riskyUsers=RISKY_USERS.slice(0,5); break;
    default: base.alerts=ALERTS.slice(0,4); base.riskyAssets=RISKY_ASSETS.slice(0,4);
  }
  if(copFocus) base.focus=copFocus;
  return [base];
}
function claudePrompt(q){
  return "You are Claude, embedded as the Cyber Defense Copilot inside CyberShield AI, an enterprise SOC and threat-hunting platform. "
    +"The analyst is in the "+moduleLabel()+" module, acting as "+ROLES[state.role].name+". "
    +"Treat the attached JSON telemetry as ground truth. Answer concisely and operationally, like a senior SOC analyst / threat hunter. "
    +"Reference specific alert / incident / CVE IDs, MITRE ATT&CK technique IDs, risk scores and concrete next actions where relevant. "
    +"Keep it under ~140 words. Light HTML only: <b>, <br>, and <span class='mono'> for IDs and queries. "
    +"Analyst question: "+q;
}
function normalizeClaude(res){
  if(res==null) return null;
  if(typeof res==='string') return res.trim()||null;
  if(res.text) return res.text;
  if(res.output) return res.output;
  if(res.answer) return res.answer;
  if(res.message) return res.message;
  if(res.content){ if(typeof res.content==='string') return res.content;
    if(Array.isArray(res.content)) return res.content.map(c=>(c&&c.text)||'').join(' ').trim()||null; }
  return null;
}
function openCopilot(seed){
  $('#copilot').classList.add('open');$('#backdrop').classList.add('show');
  if(!copStarted){copStarted=true;
    pushCop('ai','Hi — I\'m <b>Claude</b>, your Cyber Defense Copilot. I\'m wired into every CyberShield module — SOC, Threat Hunting, Vulnerability Management, IAM, Cloud and the rest — and I read the live telemetry of whatever view you\'re in. Ask me to investigate, hunt, prioritize, summarize, or generate detections.');
  }
  refreshCopChips();
  if(seed) askCop(seed);
}
function closeCopilot(){$('#copilot').classList.remove('open');$('#backdrop').classList.remove('show')}
function pushCop(who,txt){
  const b=$('#copBody');
  b.insertAdjacentHTML('beforeend','<div class="cop-msg '+who+'"><div class="cop-av">'+(who==='ai'?'&#10024;':'&#129489;')+'</div><div class="b">'+txt+'</div></div>');
  b.scrollTop=b.scrollHeight;
}
function sendCop(){const v=$('#copInput').value.trim();if(!v)return;$('#copInput').value='';askCop(v)}
async function askCop(q){
  pushCop('me',q);
  const b=$('#copBody');
  b.insertAdjacentHTML('beforeend','<div class="cop-msg ai" id="typing"><div class="cop-av">&#10024;</div><div class="b muted">Claude is analyzing '+moduleLabel()+' telemetry…</div></div>');
  b.scrollTop=b.scrollHeight;
  let answer=null;
  try{
    if(window.cowork && typeof window.cowork.askClaude==='function'){
      const res=await window.cowork.askClaude(claudePrompt(q), dataForModule());
      answer=normalizeClaude(res);
    }
  }catch(e){ answer=null; }
  const t=document.getElementById('typing'); if(t) t.remove();
  if(answer){
    answer+='<div class="tiny" style="margin-top:8px;color:var(--accent2)">&#10024; Claude · grounded in '+moduleLabel()+'</div>';
  }else{
    answer=copReply(q)+'<div class="tiny muted" style="margin-top:8px;border-top:1px solid var(--line);padding-top:6px">Demo response. Open this app as a Cowork Artifact for live Claude answers grounded in the active module.</div>';
  }
  pushCop('ai',answer);
}
function copReply(q){
  const s=q.toLowerCase();
  if((s.indexOf('why')>=0&&s.indexOf('alert')>=0)||s.indexOf('4821')>=0)
    return '<b>AL-4821 is Critical (risk 96).</b><br>• Encoded PowerShell (<span class="mono">-enc</span>) spawned from <span class="mono">winword.exe</span> — classic macro to LotL chain (T1059.001).<br>• Followed by LSASS memory access via <span class="mono">comsvcs.dll MiniDump</span> (T1003.001) — credential theft.<br>• Outbound to <span class="mono">news-cdn[.]live</span> — known C2.<br><b>Why critical:</b> Finance-segment host, credential access + active C2, matches APT-Sandworm TTPs. <b>Recommend:</b> host already auto-isolated — reset j.okoro creds, hunt SMB lateral movement, open incident.';
  if(s.indexOf('dns tunnel')>=0)
    return 'Here is a hunt query for <b>DNS tunneling</b> (T1071.004):<br><div class="codeblk" style="margin-top:8px">DnsEvents<br>| where TimeGenerated &gt; ago(24h)<br>| summarize q=count(), avglen=avg(strlen(QueryName)),<br>&nbsp;&nbsp;uniq=dcount(QueryName) by ClientIP, bin(TimeGenerated,10m)<br>| where q &gt; 200 and avglen &gt; 50 and uniq &gt; 150</div>Flags high-volume, high-entropy subdomain queries. Want me to convert to Splunk SPL or run it?';
  if(s.indexOf('mitre')>=0&&(s.indexOf('incident')>=0||s.indexOf('0412')>=0))
    return '<b>INC-2026-0412 kill chain:</b><br>• <span class="mono">T1566.001</span> Initial Access — malicious macro<br>• <span class="mono">T1059.001</span> Execution — PowerShell<br>• <span class="mono">T1003.001</span> Credential Access — LSASS<br>• <span class="mono">T1021.002</span> Lateral Movement — SMB<br>• <span class="mono">T1486</span> Impact — ransomware staging<br>Mapped to ATT&CK with evidence per technique. Shall I generate the closure report?';
  if(s.indexOf('executive')>=0||s.indexOf('board')>=0||s.indexOf('summary')>=0)
    return '<b>Executive Summary — Ransomware Incident (INC-2026-0412)</b><br>A finance workstation was compromised via a phishing macro leading to credential theft and ransomware staging. The host was auto-isolated within 2 minutes; no encryption occurred and no data loss is confirmed. Two related accounts were reset. Estimated avoided impact: <b>$18.2M</b>. Root cause: macro execution + delayed VPN patch. Recommended investments: PAM rollout, macro hardening, 24x7 MDR. <i>Full report ready to export.</i>';
  if(s.indexOf('containment')>=0||s.indexOf('respond')>=0||s.indexOf('recommend')>=0)
    return '<b>Recommended containment:</b><br>1. Isolate affected host(s) — <span class="mono">FIN-WS-204</span> done<br>2. Disable / reset compromised accounts<br>3. Block C2 indicators (<span class="mono">news-cdn[.]live</span>, hash a3f9…e21b)<br>4. Hunt lateral movement (SMB/RDP) across FIN segment<br>5. Preserve forensic evidence (immutable)<br>I can trigger the Ransomware Containment playbook (manager approval required). Proceed?';
  if(s.indexOf('sigma')>=0||s.indexOf('detection')>=0||s.indexOf('rule')>=0)
    return '<div class="codeblk">title: Encoded PowerShell + LSASS Access<br>logsource: {category: process_creation, product: windows}<br>detection:<br>&nbsp;&nbsp;sel_ps: {Image|endswith: powershell.exe, CommandLine|contains: \'-enc\'}<br>&nbsp;&nbsp;sel_lsass: {CommandLine|contains: [\'comsvcs\',\'MiniDump\',\'lsass\']}<br>&nbsp;&nbsp;condition: sel_ps and sel_lsass<br>level: critical<br>tags: [attack.t1059.001, attack.t1003.001]</div>Tuning: allowlist EDR/backup service accounts. Deploy to Sentinel + Defender?';
  if(s.indexOf('control')>=0&&s.indexOf('fail')>=0)
    return '<b>Control failures (INC-2026-0412):</b><br>• <span class="mono">ISO A.8.7</span> Malware protection — macro executed<br>• <span class="mono">A.5.17</span> Authentication — creds reused<br>• <span class="mono">A.8.8</span> Vuln mgmt — delayed patch<br>Mapped to NIST <span class="mono">PR.AC</span>, <span class="mono">DE.CM</span>. I have drafted the remediation plan with owners and due dates — open in Compliance?';
  if((s.indexOf('hunt')>=0&&s.indexOf('hypoth')>=0)||s.indexOf('suggest')>=0)
    return 'Based on current telemetry I suggest:<br>1. <b>Off-hours privileged PowerShell</b> to lateral movement (active signals on FIN segment)<br>2. <b>DNS tunneling</b> low-and-slow exfil (MKT-WS-77 beaconing)<br>3. <b>Cloud IAM role chaining</b> to privesc (ci-deployer key anomaly)<br>Each maps to MITRE with ready-to-run queries. Want me to scaffold hunt #1?';
  if(s.indexOf('activity related')>=0||s.indexOf('investigate')>=0)
    return 'Pulling 24h activity… Key findings: anomalous auth from new geo, linkage to an active alert, and access to sensitive resources outside baseline. Risk elevated to <b>High</b>. I recommend session revocation + step-up verification. Want the full timeline or to trigger a response?';
  if(s.indexOf('firewall')>=0)
    return 'I found <b>4 over-permissive rules</b> on the management VLAN (any-to-any). Recommended: scope source to jump-box subnet <span class="mono">10.10.50.0/24</span>, deny inbound from user VLANs, log+alert on management-plane access. This closes the lateral-movement path used in INC-2026-0412. Generate the change request?';
  if(s.indexOf('automat')>=0)
    return 'Safe to fully automate (low-risk, high-confidence): IP/domain enrichment, IOC blocking on proxy, phishing email clawback, ticket creation, and session revocation for confirmed impossible-travel. Keep manual approval for: account disable, endpoint isolation, firewall changes, cloud key revocation. This frees ~38 analyst-hours/week.';
  return 'I have analyzed the request against your telemetry. I can investigate entities, explain alerts, build hunt queries (KQL/SPL/SQL), map MITRE ATT&CK, summarize incidents, draft executive/board reports, generate Sigma/detection rules, and recommend response actions. Try one of the suggested prompts, or tell me the alert / incident / entity you want to dig into.';
}

function initRoles(){
  $('#roleSelect').innerHTML=Object.keys(ROLES).map(k=>'<option value="'+k+'">'+ROLES[k].name+'</option>').join('');
  $('#roleSelect').value=state.role;
  $('#roleSelect').onchange=(e)=>setRole(e.target.value);
}
$('#globalSearch').addEventListener('keydown',e=>{if(e.key==='Enter'){openCopilot('Search and investigate: '+e.target.value)}});

initRoles();
buildNav();
render();
</script>
